<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coming Soon | FabTechBD</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #fff; text-align: center; padding: 20px; }
    .container { max-width: 600px; }
    .logo { font-size: 2.5rem; font-weight: 800; letter-spacing: 2px; margin-bottom: 10px; }
    .logo span { color: #f97316; }
    .tagline { font-size: 1rem; color: #a5b4fc; margin-bottom: 50px; letter-spacing: 1px; text-transform: uppercase; }
    h1 { font-size: 3rem; font-weight: 700; margin-bottom: 16px; line-height: 1.2; }
    p { font-size: 1.1rem; color: #cbd5e1; margin-bottom: 50px; line-height: 1.7; }
    .countdown { display: flex; justify-content: center; gap: 20px; margin-bottom: 50px; flex-wrap: wrap; }
    .countdown-item { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 20px 24px; min-width: 90px; }
    .countdown-item .number { font-size: 2.5rem; font-weight: 700; color: #f97316; display: block; }
    .countdown-item .label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
    .notify-form { display: flex; gap: 10px; max-width: 420px; margin: 0 auto; flex-wrap: wrap; justify-content: center; }
    .notify-form input { flex: 1; min-width: 220px; padding: 14px 18px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: #fff; font-size: 0.95rem; outline: none; }
    .notify-form input::placeholder { color: #94a3b8; }
    .notify-form button { padding: 14px 24px; border-radius: 8px; border: none; background: #f97316; color: #fff; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
    .footer { margin-top: 60px; font-size: 0.8rem; color: #475569; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Fab<span>Tech</span>BD</div>
    <div class="tagline">Technology &bull; Innovation &bull; Solutions</div>
    <h1>We're Coming Soon</h1>
    <p>Something amazing is in the works. We're putting the finishing touches on our new website. Stay tuned!</p>
    <div class="countdown" id="countdown">
      <div class="countdown-item"><span class="number" id="days">00</span><span class="label">Days</span></div>
      <div class="countdown-item"><span class="number" id="hours">00</span><span class="label">Hours</span></div>
      <div class="countdown-item"><span class="number" id="minutes">00</span><span class="label">Minutes</span></div>
      <div class="countdown-item"><span class="number" id="seconds">00</span><span class="label">Seconds</span></div>
    </div>
    <div class="notify-form">
      <input type="email" placeholder="Enter your email address" />
      <button type="button">Notify Me</button>
    </div>
    <div class="footer">&copy; 2026 FabTechBD. All rights reserved.</div>
  </div>
  <script>
    const launchDate = new Date('2026-09-01T00:00:00');
    function updateCountdown() {
      const now = new Date();
      const diff = launchDate - now;
      if (diff <= 0) { document.getElementById('countdown').style.display='none'; return; }
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      document.getElementById('days').textContent = String(d).padStart(2,'0');
      document.getElementById('hours').textContent = String(h).padStart(2,'0');
      document.getElementById('minutes').textContent = String(m).padStart(2,'0');
      document.getElementById('seconds').textContent = String(s).padStart(2,'0');
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
